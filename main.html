<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toxic-Mini-Bot | WhatsApp Pairing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
        }

        .bg-circles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
        }

        .chatbot-container { width: 100%; max-width: 450px; position: relative; z-index: 1; }

        .bot-message {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px; margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .bot-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .bot-avatar { width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        .stats-box { background: rgba(15, 23, 42, 0.4); border-radius: 16px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-around; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.65rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; }

        .main-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .input-wrapper {
            position: relative;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid var(--border);
            border-radius: 16px;
            display: flex; align-items: center;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }

        input { width: 100%; padding: 18px 15px; background: transparent; border: none; color: #fff; font-size: 1.1rem; outline: none; text-align: center; letter-spacing: 1px; }

        .btn-pair, .btn-copy {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white; border: none; border-radius: 16px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        .btn-pair:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

        #resultView { display: none; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .code-display { background: rgba(0, 0, 0, 0.3); border-radius: 16px; padding: 25px; margin: 20px 0; border: 1px dashed var(--success); position: relative; }
        .code-value { font-family: 'Courier New', monospace; font-size: 2.2rem; letter-spacing: 5px; color: var(--success); font-weight: 800; }

        .loader { display: none; margin: 20px 0; }
        .loader-spinner { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer { text-align: center; padding-top: 25px; color: var(--text-light); font-size: 0.85rem; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #fff; color: #000; padding: 12px 25px; border-radius: 12px;
            font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; transition: 0.4s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="bg-circles"></div>

    <div class="chatbot-container">
        <div class="bot-message">
            <div class="bot-header">
                <div class="bot-avatar"><i class="fas fa-robot"></i></div>
                <div class="bot-info">
                    <h2 style="font-size: 1.3rem;">Toxic-Mini-Bot</h2>
                    <p style="font-size: 0.75rem;"><i class="fas fa-circle" style="color: var(--success); font-size: 8px;"></i> SERVER ACTIVE</p>
                </div>
            </div>

            <div class="stats-box">
                <div class="stat-item"><div class="stat-value" id="activeSessions">0</div><div class="stat-label">Active</div></div>
                <div class="stat-item"><div class="stat-value" id="totalNumbers">0</div><div class="stat-label">Stored</div></div>
            </div>
        </div>

        <div class="main-card">
            <div id="inputView">
                <h3 style="margin-bottom: 10px;">Link Device</h3>
                <p style="margin-bottom: 20px; font-size: 0.85rem; color: var(--text-light);">Tuma namba yako upewe code ya WhatsApp.</p>
                <div class="input-wrapper">
                    <input type="tel" id="phoneNumber" placeholder="Mfano: 254735342808">
                </div>
                <button class="btn-pair" onclick="pairNumber()" id="submitBtn">
                    <span>GENERATE CODE</span> <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <div id="loadingView" class="loader">
                <div class="loader-spinner"></div>
                <p style="font-weight: 500; letter-spacing: 1px;">WAITING FOR CODE...</p>
            </div>

            <div id="resultView">
                <div style="width: 60px; height: 60px; background: rgba(16, 185, 129, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                    <i class="fas fa-check-circle" style="font-size: 2rem; color: var(--success);"></i>
                </div>
                <h3>PAIRED CODE</h3>
                <div class="code-display">
                    <div class="code-value" id="pairingCode">--------</div>
                </div>
                <button class="btn-copy" onclick="copyCode()" id="copyBtn">
                    <i class="fas fa-copy"></i> <span>COPY CODE</span>
                </button>
                <p style="font-size: 0.75rem; color: var(--text-light); margin-top: 15px;">Ingiza code hii kwenye WhatsApp: <br><b>Linked Devices > Link with Phone Number</b></p>
            </div>
        </div>

        <div class="footer">
            <p>Toxic-Mini-Bot &copy; 2026 | Developed by Fredi</p>
            <div class="footer-links">
                <a onclick="refreshStats()"><i class="fas fa-sync"></i> Update Stats</a>
                <a href="https://wa.me/254735342808" target="_blank"><i class="fab fa-whatsapp"></i> Support</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
        // Inatambua kama unatumia localhost au production
        const API_URL = window.location.origin;

        async function refreshStats() {
            try {
                // Route tulizoweka kwenye pair.js awali
                const res = await fetch(`${API_URL}/code/api/active`);
                const data = await res.json();
                document.getElementById('activeSessions').textContent = data.count || 0;
                
                const resAll = await fetch(`${API_URL}/code/api/sessions`);
                const dataAll = await resAll.json();
                document.getElementById('totalNumbers').textContent = dataAll.sessions ? dataAll.sessions.length : 0;
            } catch (e) { 
                console.log("Stats refresh failed, silent error.");
            }
        }

        async function pairNumber() {
            let num = document.getElementById('phoneNumber').value.replace(/\s/g, '').replace(/\+/g, '');
            
            if (!num || num.length < 10) {
                return showToast("Weka namba kamili!");
            }

            toggleView('loading');

            try {
                // Tunapiga /code?number=... kulingana na index.js yetu
                const response = await fetch(`${API_URL}/code?number=${num}`);
                const data = await response.json();

                if (data.code) {
                    document.getElementById('pairingCode').textContent = data.code;
                    toggleView('result');
                    showToast("Code Tayari!", "success");
                } else {
                    showToast(data.error || "Jaribu tena baadaye");
                    toggleView('input');
                }
            } catch (e) {
                showToast("Server error. Jaribu tena.");
                toggleView('input');
            }
        }

        function copyCode() {
            const code = document.getElementById('pairingCode').textContent;
            if(code === "--------") return;
            
            navigator.clipboard.writeText(code);
            showToast("Code Imenakiliwa!");

            setTimeout(() => {
                toggleView('input');
                document.getElementById('phoneNumber').value = "";
            }, 3000);
        }

        function toggleView(view) {
            document.getElementById('inputView').style.display = view === 'input' ? 'block' : 'none';
            document.getElementById('loadingView').style.display = view === 'loading' ? 'block' : 'none';
            document.getElementById('resultView').style.display = view === 'result' ? 'block' : 'none';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Anza kusoma stats mara tu ukurasa unapofunguka
        window.onload = refreshStats;
    </script>
</body>
</html>
